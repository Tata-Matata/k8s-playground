## We previously deployed global policy that denies everything by default
## Now we will allow only restricted access
## In the first step, we allow all Egress to busybox only

- name: Implement targeted policy to allow egress from busybox
  hosts: k8s-playground
  vars:
    policy_name: calico-allow-egress
    policy_path: "{{ calico_tmp_folder }}/{{ policy_name }}.yaml"
    wget_timeout_seconds: 5
  tasks:


  ## ADD  POLICY to allow all egress from busybox pod
    
  - name: Ensure tmp dir exists
    ansible.builtin.file:
      path: "{{ calico_tmp_folder }}"
      state: directory
      mode: '0755'

  - name: Render targeted policy manifest
    ansible.builtin.template:
      src: "{{ policy_name }}.yaml.j2"
      dest: "{{  policy_path }}"
      mode: '0644'

  - name: Delete policy in case already exists
    ansible.builtin.command:
      cmd: kubectl delete --force -f "{{  policy_path }}"
    failed_when: false
  
  - name: Apply policy
    ansible.builtin.command:
      cmd: kubectl create -f "{{  policy_path }}"
  
  ## TEST public internet now reachable
  - name: Test public internet
    ansible.builtin.include_tasks: check-wget-success.yaml
    vars:
      wget_command: >-
        kubectl exec --namespace={{ calico_ns }} access --
        wget --timeout={{ wget_timeout_seconds }} --tries=1 -qO-
        https://docs.tigera.io/pod-connection-test.txt
      expected_success_text: successfully connected
      success_fail_msg: Public internet not reached


  ## Nginx from busybox should fail, because default deny policy blocks ingress traffic to nginx 
  - name: Query nginx from busybox
    ansible.builtin.include_tasks: check-wget-failure.yaml
    vars:
      wget_command: >-
        kubectl exec --namespace={{ calico_ns }} access --
        wget --timeout={{ wget_timeout_seconds }} --tries=1 -qO- http://nginx
      failure_fail_msg: Nginx is still reachable



