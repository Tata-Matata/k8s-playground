## Allow ingress traffic to nginx pods from busybox pods

- name: Implement targeted policy to allow ingress into nginx 
  hosts: k8s-playground
  vars:
    policy_name: calico-allow-ingress
    policy_path: "{{ calico_tmp_folder }}/{{ policy_name }}.yaml"
    wget_timeout_seconds: 5
  tasks:


  ## ADD  POLICY to allow all ingress to nginx from busybox pod
  - name: Ensure tmp dir exists
    ansible.builtin.file:
      path: "{{ calico_tmp_folder }}"
      state: directory
      mode: '0755'

  - name: Render targeted policy manifest
    ansible.builtin.template:
      src: "{{ policy_name }}.yaml.j2"
      dest: "{{  policy_path }}"
      mode: '0644'

  - name: Delete policy in case already exists
    ansible.builtin.command:
      cmd: kubectl delete --force -f "{{  policy_path }}"
    failed_when: false
  
  - name: Apply policy
    ansible.builtin.command:
      cmd: kubectl create -f "{{  policy_path }}"
  

  ## Nginx from busybox should be reachable now
  - name: Query nginx from busybox
    ansible.builtin.include_tasks: check-wget-success.yaml
    vars:
      wget_command: >-
        kubectl exec --namespace={{ calico_ns }} access --
        wget --timeout={{ wget_timeout_seconds }} --tries=1 -qO- http://nginx
      expected_success_text: Welcome to nginx
      success_fail_msg: Nginx not reached



