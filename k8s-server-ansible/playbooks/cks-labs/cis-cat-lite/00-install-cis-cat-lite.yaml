## For the playbook to work you need to download CIS CAT Lite from https://learn.cisecurity.org/cis-cat-lite
## Place CIS-CAT-Lite.zip into the playbooks folder

- name: Install Java for CIS-CAT Lite
  hosts: k8s-playground
  gather_facts: false
  vars:
    unzip_package: unzip
    cis_cat_archive: CIS-CAT-Lite.zip
    ## playbook_dir is internal Ansible var, resolves to the directory of the currently running playbook
    cis_cat_archive_local_path: "{{ playbook_dir }}/{{ cis_cat_archive }}"
    cis_cat_remote_archive: /tmp/CIS-CAT-Lite.zip
    java_runtime_archive: /tmp/temurin-jre-{{ java_version }}.tar.gz
    java_download_url: https://api.adoptium.net/v3/binary/latest/{{ java_version }}/ga/linux/x64/jre/hotspot/normal/eclipse
    ssh_private_key_file: "{{ lookup('ansible.builtin.config', 'DEFAULT_PRIVATE_KEY_FILE') }}"
    ssh_target_host: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"

  tasks:
  - name: Update apt package index
    ansible.builtin.apt:
      update_cache: true

  - name: Install CIS-CAT Lite prerequisites
    ansible.builtin.apt:
      name:
      - "{{ unzip_package }}"
      state: present

  - name: Download Java runtime archive
    ansible.builtin.get_url:
      url: "{{ java_download_url }}"
      dest: "{{ java_runtime_archive }}"
      mode: "0644"

  - name: Ensure Java runtime directory exists
    ansible.builtin.file:
      path: "{{ java_runtime_dir }}"
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Extract Java runtime
    ansible.builtin.unarchive:
      src: "{{ java_runtime_archive }}"
      dest: "{{ java_runtime_dir }}"
      remote_src: true
      extra_opts:
      - --strip-components=1

  - name: Ensure Java binary is executable
    ansible.builtin.file:
      path: "{{ java_runtime_dir }}/bin/java"
      mode: "0755"

  - name: Add Java to PATH via symlink
    ansible.builtin.file:
      src: "{{ java_runtime_dir }}/bin/java"
      dest: /usr/local/bin/java
      state: link

  - name: Persist JAVA_HOME for interactive shells
    ansible.builtin.copy:
      ## scripts under /etc/profile.d are executed every time we open a shell
      dest: /etc/profile.d/temurin-java.sh
      owner: root
      group: root
      mode: "0644"
      content: |
        export JAVA_HOME="{{ java_runtime_dir }}"
        export PATH="{{ java_runtime_dir }}/bin:$PATH"

  - name: Verify Java is installed
    ansible.builtin.command: "{{ java_runtime_dir }}/bin/java -version"
    register: java_check
    changed_when: false

  - name: Show Java version
    ansible.builtin.debug:
      msg: "{{ java_check.stderr_lines | default([]) }}"
  
  - name: Verify Java version is correct
    ansible.builtin.assert:
      that:
      - java_version in java_check.stderr

  - name: Remove existing CIS-CAT-Lite archive before copying
    ansible.builtin.file:
      path: "{{ cis_cat_remote_archive }}"
      state: absent
  
  - name: Copy CIS-CAT-Lite archive with scp
    ansible.builtin.command:
      argv:
      - scp
      - -q
      - -i
      - "{{ ssh_private_key_file }}"
      - "{{ cis_cat_archive_local_path }}"
      - "root@{{ ssh_target_host }}:{{ cis_cat_remote_archive }}"
    delegate_to: localhost
    changed_when: true

  - name: Ensure CIS-CAT-Lite install directory exists
    ansible.builtin.file:
      path: "{{ cis_cat_install_dir }}"
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: Extract CIS-CAT-Lite archive
    ansible.builtin.unarchive:
      src: "{{ cis_cat_remote_archive }}"
      dest: "{{ cis_cat_install_dir }}"
      remote_src: true

  - name: Remove CIS-CAT-Lite archive after extraction
    ansible.builtin.file:
      path: "{{ cis_cat_remote_archive }}"
      state: absent

  - name: Remove Java runtime archive after extraction
    ansible.builtin.file:
      path: "{{ java_runtime_archive }}"
      state: absent

