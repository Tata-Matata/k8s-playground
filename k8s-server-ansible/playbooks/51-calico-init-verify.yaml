- name: Wait for Calico components to initialize
  hosts: k8s-playground
  tasks:
  
  ## WAIT
  - name: Wait for Calico components to become available
    ansible.builtin.command:
      ## go to json object's status.conditions array, 
      ## filter that array to only the entries where type is "Available"
      ## from the filtered matching entry, print its status field
      ##status:
      ##  conditions:
      ##- type: Progressing
      ##  status: "False"
      ##- type: Available
      ##  status: "True"
      cmd: >-
        kubectl get tigerastatus {{ item }} -o json
    register: calico_component_status
    changed_when: false
    retries: 30
    delay: 10
    until: 
    - calico_component_status.rc == 0
    - calico_component_status.stdout | trim != ""
    - >-
      (
        (calico_component_status.stdout | from_json).status.conditions
        | selectattr('type', 'equalto', 'Available')
        | map(attribute='status')
        | first
      ) == 'True'
    loop:
    - apiserver
    - calico
    - goldmane
    - ippools
    - whisker
  
  ## POST-CHECK
  - name: Wait for calico-node daemonset rollout
    ansible.builtin.command:
      cmd: kubectl rollout status daemonset/calico-node -n calico-system --timeout=300s
    changed_when: false

  - name: Wait for calico-kube-controllers rollout
    ansible.builtin.command:
      cmd: kubectl rollout status deployment/calico-kube-controllers -n calico-system --timeout=300s
    changed_when: false